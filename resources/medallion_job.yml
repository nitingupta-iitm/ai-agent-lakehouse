# Databricks Workflow (Job) — the orchestration layer.
# Defines the medallion task graph as code: generate -> setup -> bronze ->
# silver (with data quality) -> gold. Each task depends on the previous one,
# so a failure (e.g. the Silver DQ gate tripping) stops the run.

resources:
  jobs:
    medallion_pipeline:
      name: "[${bundle.target}] AI Agent Lakehouse — Medallion Pipeline"

      # Run every day at 06:00 UTC; paused in dev (mode: development pauses it).
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "PAUSED"

      email_notifications:
        on_failure:
          - ${var.notifications_email}

      # Shared single-node job cluster for all tasks (cheap; ideal for the demo).
      job_clusters:
        - job_cluster_key: medallion_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: "singleNode"
            custom_tags:
              ResourceClass: "SingleNode"

      tasks:
        - task_key: generate_data
          job_cluster_key: medallion_cluster
          notebook_task:
            notebook_path: ../notebooks/99_data_generator.py
            base_parameters:
              catalog: ${var.catalog}
              run_id: "{{job.run_id}}"

        - task_key: setup
          depends_on:
            - task_key: generate_data
          job_cluster_key: medallion_cluster
          notebook_task:
            notebook_path: ../notebooks/00_setup.py
            base_parameters:
              catalog: ${var.catalog}

        - task_key: bronze_ingest
          depends_on:
            - task_key: setup
          job_cluster_key: medallion_cluster
          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}

        - task_key: silver_clean
          depends_on:
            - task_key: bronze_ingest
          job_cluster_key: medallion_cluster
          notebook_task:
            notebook_path: ../notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}

        - task_key: gold_aggregate
          depends_on:
            - task_key: silver_clean
          job_cluster_key: medallion_cluster
          notebook_task:
            notebook_path: ../notebooks/03_gold_aggregate.py
            base_parameters:
              catalog: ${var.catalog}
